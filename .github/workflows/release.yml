name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          VERSION=${GITHUB_REF#refs/tags/}
          go build -ldflags="-X main.Version=$VERSION -s -w" -o "dist/hollow-${{ matrix.goos }}-${{ matrix.goarch }}$EXT" ./cmd/hollow

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            dist/hollow-linux-amd64
            dist/hollow-linux-arm64
            dist/hollow-windows-amd64.exe
            dist/hollow-darwin-amd64
            dist/hollow-darwin-arm64